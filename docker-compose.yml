version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: accounting-db
    environment:
      POSTGRES_USER: ${DB_USER:-accounting_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      POSTGRES_DB: accounting_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/migrations:/migrations:ro
    ports:
      - "5432:5432"
    command: >
      postgres 
      -c shared_preload_libraries=pgcrypto
      -c log_statement=all
      -c log_destination=stderr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting_admin -d accounting_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accounting-net

  redis:
    image: redis:7-alpine
    container_name: accounting-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - accounting-net

  minio:
    image: minio/minio:latest
    container_name: accounting-s3
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - accounting-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: accounting-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - accounting-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: accounting-vector
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - accounting-net

  traefik:
    image: traefik:v3.0
    container_name: accounting-gateway
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - accounting-net

  ledger-processor:
    build: ./ledger-processor
    container_name: accounting-ledger
    environment:
      DB_DSN: postgres://${DB_USER:-accounting_admin}:${DB_PASSWORD:-changeme_in_production}@postgres:5432/accounting_platform?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ledger.rule=Host(`localhost`) && PathPrefix(`/api/v1/ledger`)"
      - "traefik.http.services.ledger.loadbalancer.server.port=8080"
    networks:
      - accounting-net

  ai-orchestrator:
    build: ./ai-orchestrator
    container_name: accounting-ai
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LITELLM_PROXY_URL: ${LITELLM_PROXY_URL}
      DATABASE_URL: postgres://${DB_USER:-accounting_admin}:${DB_PASSWORD:-changeme_in_production}@postgres:5432/accounting_platform?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      QDRANT_URL: http://qdrant:6333
      GUARDRAILS_URL: http://guardrails:8080
      PORT: 8000
    depends_on:
      - postgres
      - redis
      - qdrant
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=Host(`localhost`) && PathPrefix(`/api/v1/ai`)"
      - "traefik.http.services.ai.loadbalancer.server.port=8000"
    networks:
      - accounting-net

  rag-service:
    build: ./rag-service
    container_name: accounting-rag
    environment:
      QDRANT_URL: http://qdrant:6333
      ES_URL: http://elasticsearch:9200
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
      PORT: 8000
    depends_on:
      - qdrant
      - elasticsearch
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rag.rule=Host(`localhost`) && PathPrefix(`/api/v1/rag`)"
      - "traefik.http.services.rag.loadbalancer.server.port=8000"
    networks:
      - accounting-net

  ocr-pipeline:
    build: ./ocr-pipeline
    container_name: accounting-ocr
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: accounting-documents
      TESSDATA_PREFIX: /usr/share/tesseract-ocr/4.00/tessdata
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      PORT: 8000
    depends_on:
      - minio
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ocr.rule=Host(`localhost`) && PathPrefix(`/api/v1/ocr`)"
      - "traefik.http.services.ocr.loadbalancer.server.port=8000"
    networks:
      - accounting-net

  guardrails-service:
    build: ./guardrails-service
    container_name: accounting-guardrails
    environment:
      PORT: 8080
      TOPIC_CLASSIFIER_MODEL: facebook/bart-large-mnli
      CONFIDENCE_THRESHOLD: "0.85"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.guardrails.rule=Host(`localhost`) && PathPrefix(`/api/v1/guardrails`)"
      - "traefik.http.services.guardrails.loadbalancer.server.port=8080"
    networks:
      - accounting-net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  es_data:
  qdrant_data:

networks:
  accounting-net:
    driver: bridge