apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: accounting-default-deny
  namespace: accounting
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ledger-to-postgres
  namespace: accounting
spec:
  podSelector:
    matchLabels:
      app: ledger-processor
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ai-to-guardrails
  namespace: accounting
spec:
  podSelector:
    matchLabels:
      app: ai-orchestrator
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: guardrails-service
    ports:
    - protocol: TCP
      port: 8080
  - to:
    - podSelector:
        matchLabels:
          app: rag-service
    ports:
    - protocol: TCP
      port: 8000
