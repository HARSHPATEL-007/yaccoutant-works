apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator
  namespace: accounting
  labels:
    app: ai-orchestrator
    version: v2.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-orchestrator
  template:
    metadata:
      labels:
        app: ai-orchestrator
        version: v2.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: accounting-sa
      containers:
      - name: ai
        image: accounting-platform/ai-orchestrator:v2.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: url
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis-cluster.accounting.svc.cluster.local:6379/0"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: password
        - name: QDRANT_URL
          value: "http://qdrant.accounting.svc.cluster.local:6333"
        - name: GUARDRAILS_URL
          value: "http://guardrails-service.accounting.svc.cluster.local:8080"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-secret
              key: api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: anthropic-secret
              key: api-key
        - name: LITELLM_PROXY_URL
          value: "http://litellm-proxy.accounting.svc.cluster.local:4000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /api/v1/ai/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/v1/ai/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-orchestrator
  namespace: accounting
spec:
  selector:
    app: ai-orchestrator
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
